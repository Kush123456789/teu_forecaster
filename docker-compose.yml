services:
  forecaster:
    build: .
    container_name: mombasa-forecaster
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
